name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'OS to run on (leave empty for both)'
        required: false
        type: choice
        options:
          - all
          - ubuntu-latest
          - macos-latest
        default: 'all'
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx biome ci src/

  e2e:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ github.event.inputs.os == 'all' && fromJson('["ubuntu-latest","macos-latest"]') || github.event.inputs.os && fromJson(format('["{0}"]', github.event.inputs.os)) || fromJson('["ubuntu-latest","macos-latest"]') }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test-ci